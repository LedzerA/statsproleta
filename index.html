function renderLineupSection(){
  const f=UI.form;
  // chips ordenados por frequência (só jogos que contam), com top-25 + busca + mostrar mais
  const freq=freqMap();
  const term=(UI.lineupSearch||"").trim().toLowerCase();
  const sorted=[...DATA.roster].sort((a,b)=>(freq[b.id]||0)-(freq[a.id]||0) || a.name.localeCompare(b.name,"pt"));
  let visible;
  if(term){
    visible=sorted.filter(a=>a.name.toLowerCase().includes(term));
  } else if(UI.lineupShowAll){
    visible=sorted;
  } else {
    const top=sorted.slice(0,25);
    const topIds=new Set(top.map(a=>a.id));
    const extras=sorted.filter(a=>f.lineup.has(a.id) && !topIds.has(a.id)); // não esconde quem já foi marcado
    visible=[...top,...extras];
  }
  const chips=visible.map(a=>`<button class="chip ${f.lineup.has(a.id)?"on":""}" data-act="chip" data-id="${a.id}">${esc(a.name)}</button>`).join("");
  const hidden=sorted.length-visible.length;
  let moreBtn="";
  if(!term && !UI.lineupShowAll && hidden>0) moreBtn=`<button class="chip more" data-act="lineup-more">+ mostrar mais (${hidden})</button>`;
  else if(!term && UI.lineupShowAll) moreBtn=`<button class="chip more" data-act="lineup-less">− mostrar menos</button>`;
  el("f-chips").innerHTML = (chips+moreBtn) || `<div class="ga-empty">Nenhum atleta encontrado.</div>`;
  // lista de gols/assist/titular: atletas na escalação (ou que já tenham gol/assist)
  const ids = new Set([...f.lineup, ...Object.keys(f.scorers), ...Object.keys(f.assists)]);
  const ordered = DATA.roster.filter(a=>ids.has(a.id));
  const cont = el("f-ga-container");
  if(ordered.length===0){
    cont.innerHTML = `<div class="ga-empty">Marque os relacionados acima para definir titulares, gols e assistências.</div>`;
  } else {
    const head = `<div class="ga-head"><span>Atleta</span><span>Gols</span><span>Assist.</span></div>`;
    const rows = ordered.map(a=>{
      const g=f.scorers[a.id]||0, n=f.assists[a.id]||0, tit=f.starters.has(a.id);
      return `<div class="ga-row"><div class="nm"><button class="tit-btn ${tit?"on":""}" data-act="titular" data-id="${a.id}" title="${tit?"Titular":"Marcar titular"}">${tit?"★":"☆"}</button> ${esc(a.name)}</div>
        <div class="stepper"><button data-act="g-" data-id="${a.id}">−</button><span class="val ${g?"":"zero"}" id="g-${a.id}">${g}</span><button data-act="g+" data-id="${a.id}">+</button></div>
        <div class="stepper"><button data-act="a-" data-id="${a.id}">−</button><span class="val ${n?"":"zero"}" id="a-${a.id}">${n}</span><button data-act="a+" data-id="${a.id}">+</button></div>
      </div>`;
    }).join("");
    const nTit=[...f.starters].filter(id=>f.lineup.has(id)).length;
    cont.innerHTML = `<div class="ga-list">${head}${rows}</div><div class="tit-count">★ ${nTit} titular${nTit!==1?"es":""} marcado${nTit!==1?"s":""}</div>`;
  }
  updateTotals();
}

function updateTotals(){
  const f=UI.form;
  const gSum = Object.values(f.scorers).reduce((a,b)=>a+b,0);
  const aSum = Object.values(f.assists).reduce((a,b)=>a+b,0);
  const gf = parseInt(el("f-gf").value)||0;
  el("f-totals").textContent = `Marcadores: ${gSum} gol(s) · ${aSum} assistência(s) · ${f.lineup.size} relacionado(s)`;
  const w=el("f-warn");
  if(gSum>0 && gf>0 && gSum!==gf){
    w.textContent = `⚠ Os marcadores somam ${gSum} gol(s), mas o placar do Proleta é ${gf}. Tudo bem se houve gol contra a favor — só confira.`;
    w.classList.add("show");
  } else w.classList.remove("show");
}

/* ============ binding de eventos ============ */
function bind(s){
  // navegação e ações gerais via delegação
  app().onkeydown = (e)=>{
    if(e.key!=="Enter" && e.key!==" ") return;
    const th = e.target.closest && e.target.closest('th[data-act="sort"]');
    if(!th) return;
    e.preventDefault(); th.click();
  };
  app().onclick = (e)=>{
    const node = e.target.closest("[data-act]"); if(!node) return;
    const act=node.dataset.act;
    if(act==="tab"){ UI.perfil=null; UI.view=node.dataset.tab; render(); }
    else if(act==="sort"){ const k=node.dataset.key; if(UI.sortKey===k) UI.sortDir*=-1; else {UI.sortKey=k; UI.sortDir = k==="name"?1:-1;} render(); }
    else if(act==="new"){ openForm(null); }
    else if(act==="edit"){ openForm(node.dataset.id); }
    else if(act==="del"){ delMatch(node.dataset.id); }
    else if(act==="perfil"){ UI.backTo=UI.view; UI.perfil=node.dataset.id; render(); }
    else if(act==="voltar"){ UI.perfil=null; render(); }
    else if(act==="match"){ openForm(node.dataset.id); }
    else if(act==="archive"){ if(confirm("Arquivar este jogo? Ele sai das estatísticas (dá pra desarquivar depois).")) archiveMatch(node.dataset.id,true); }
    else if(act==="unarchive"){ archiveMatch(node.dataset.id,false); }
    else if(act==="titular"){ toggleTitular(node.dataset.id); }
    else if(act==="lineup-more"){ UI.lineupShowAll=true; renderLineupSection(); }
    else if(act==="lineup-less"){ UI.lineupShowAll=false; renderLineupSection(); }
    else if(act==="flt-clear"){ UI.filterKey=""; UI.filterMin=0; render(); }
    else if(act==="live"){ UI.live=node.dataset.id; UI.livePick=null; render(); }
    else if(act==="live-back"){ UI.live=null; UI.livePick=null; render(); afterFormClose(); }
    else if(act==="live-start"){ liveStart(); }
    else if(act==="live-goal"){ UI.livePick={kind:"goal",step:1}; render(); }
    else if(act==="live-ga"){ liveGA(); }
    else if(act==="live-sub"){ UI.livePick={kind:"sub",step:1}; render(); }
    else if(act==="live-pr"){ livePauseResume(); }
    else if(act==="live-undo"){ liveUndo(); }
    else if(act==="live-end"){ liveEnd(); }
    else if(act==="lp-pick"){ lpPick(node.dataset.id); }
    else if(act==="lp-none"){ lpPick(null); }
    else if(act==="lp-cancel"){ UI.livePick=null; render(); afterFormClose(); }
    else if(act==="df-clear"){ UI.dfMode="all"; render(); }
    else if(act==="overlay"){ /* fecha ao clicar fora */ if(e.target.classList.contains("overlay")) closeForm(); }
    else if(act==="close"){ closeForm(); }
    else if(act==="save"){ saveForm(); }
    else if(act==="chip"){ toggleChip(node.dataset.id); }
    else if(act==="lineup-all"){ DATA.roster.forEach(a=>UI.form.lineup.add(a.id)); renderLineupSection(); }
    else if(act==="lineup-none"){ UI.form.lineup.clear(); renderLineupSection(); }
    else if(act==="add-athlete"){ addAthlete(); }
    else if(act==="g+"){ step("scorers",node.dataset.id,1); }
    else if(act==="g-"){ step("scorers",node.dataset.id,-1); }
    else if(act==="a+"){ step("assists",node.dataset.id,1); }
    else if(act==="a-"){ step("assists",node.dataset.id,-1); }
    else if(act==="export-json"){ exportJSON(); }
    else if(act==="import-json"){ el("fileInput").click(); }
    else if(act==="export-players"){ exportPlayersCSV(s); }
    else if(act==="export-matches"){ exportMatchesCSV(); }
    else if(act==="reset-seed"){ resetSeed(); }
    else if(act==="wipe"){ wipe(); }
    else if(act==="signout"){ if(confirm("Sair da conta?")) Store.signOut(); }
  };
  // filtro da aba Atletas (onchange = só ao confirmar, sem perder foco)
  const ssel=el("squad-sel"); if(ssel) ssel.onchange=e=>{ const p=new URLSearchParams(location.search); if(e.target.value==="esporte") p.delete("elenco"); else p.set("elenco",e.target.value); const q=p.toString(); location.href=location.pathname+(q?"?"+q:""); };
  // cronômetro do ao vivo (atualiza só o texto do relógio, sem re-render)
  if(window.__lt){ clearInterval(window.__lt); window.__lt=null; }
  if(UI.live){ const lm=DATA.matches.find(x=>x.id===UI.live);
    if(lm && lm.clock && lm.clock.running){ window.__lt=setInterval(()=>{ const n=el("live-clock"); const m2=DATA.matches.find(x=>x.id===UI.live); if(n&&m2&&m2.clock) n.textContent=fmtClock(clockElapsed(m2.clock)); },1000); } }
  if(UI.livePick){ const pk=document.querySelector(".lv-picker"); if(pk && pk.scrollIntoView) pk.scrollIntoView({block:"nearest", behavior:"smooth"}); }
  const fk=el("flt-key"); if(fk) fk.onchange=e=>{ UI.filterKey=e.target.value; if(!UI.filterKey) UI.filterMin=0; else if(UI.filterMin<1) UI.filterMin=1; render(); };
  const fm=el("flt-min"); if(fm) fm.onchange=e=>{ UI.filterMin=Math.max(0,parseInt(e.target.value)||0); render(); };
  // filtro de período da aba Partidas
  const dfm=el("df-mode"); if(dfm) dfm.onchange=e=>{
    UI.dfMode=e.target.value;
    const ds=activeMatches().map(x=>x.date).sort();
    if(UI.dfMode==="month" && !UI.dfMonth && ds.length) UI.dfMonth=ds[ds.length-1].slice(0,7);
    if(UI.dfMode==="range" && !UI.dfFrom && !UI.dfTo && ds.length){ UI.dfFrom=ds[0]; UI.dfTo=ds[ds.length-1]; }
    render();
  };
  const dmo=el("df-month"); if(dmo) dmo.onchange=e=>{ UI.dfMonth=e.target.value; render(); };
  const dfr=el("df-from"); if(dfr) dfr.onchange=e=>{ UI.dfFrom=e.target.value; render(); };
  const dto=el("df-to"); if(dto) dto.onchange=e=>{ UI.dfTo=e.target.value; render(); };
  // form: inputs de texto/numero (sem re-render)
  if(UI.form){
    el("f-date").oninput=e=>UI.form.date=e.target.value;
    el("f-opp").oninput=e=>UI.form.opponent=e.target.value;
    el("f-gf").oninput=e=>{UI.form.goalsFor=parseInt(e.target.value)||0; updateTotals();};
    el("f-ga").oninput=e=>{UI.form.goalsAgainst=parseInt(e.target.value)||0;};
    el("f-complete").onchange=e=>UI.form.lineupComplete=e.target.checked;
    const fst=el("f-status"); if(fst) fst.onchange=e=>{ UI.form.status=e.target.value; };
    el("f-newname").onkeydown=e=>{ if(e.key==="Enter"){ e.preventDefault(); addAthlete(); } };
    const srch=el("f-search"); if(srch) srch.oninput=e=>{ UI.lineupSearch=e.target.value; renderLineupSection(); };
    renderLineupSection();
    setTimeout(()=>{ if(UI.form && !UI.form.id){ const o=el("f-opp"); if(o) o.focus(); } },50);
  }
}

/* ============ ações de formulário ============ */
function openForm(id){
  if(READONLY) return;
  UI.lineupSearch=""; UI.lineupShowAll=false;
  if(id){
    const m=DATA.matches.find(x=>x.id===id);
    UI.form={ id:m.id, date:m.date, opponent:m.opponent, goalsFor:m.goalsFor, goalsAgainst:m.goalsAgainst,
      lineup:new Set(m.lineup||[]), starters:new Set(m.starters||[]),
      scorers:Object.fromEntries((m.scorers||[]).map(x=>[x.a,x.g])),
      assists:Object.fromEntries((m.assists||[]).map(x=>[x.a,x.n])), lineupComplete:m.lineupComplete!==false, status:m.status||"final" };
  } else {
    const today=todayISO();
    UI.form={ id:null, date:today, opponent:"", goalsFor:0, goalsAgainst:0, lineup:new Set(), starters:new Set(), scorers:{}, assists:{}, lineupComplete:true, status:"final" };
  }
  render();
}
function closeForm(){ UI.form=null; render(); afterFormClose(); }
function toggleChip(id){
  const f=UI.form;
  if(f.lineup.has(id)){ f.lineup.delete(id); f.starters.delete(id); } // sair da escalação tira o titular
  else f.lineup.add(id);
  renderLineupSection();
}
function toggleTitular(id){
  const f=UI.form;
  if(f.starters.has(id)) f.starters.delete(id);
  else { f.starters.add(id); f.lineup.add(id); } // titular tem que ser relacionado
  renderLineupSection();
}
function archiveMatch(id, val){
  if(READONLY) return;
  const m=DATA.matches.find(x=>x.id===id); if(!m) return;
  m.archived=val; render();
  Store.upsertMatch(m).then(()=>toast(val?"Jogo arquivado":"Jogo desarquivado")).catch(saveErr);
}
function step(kind,id,delta){
  const f=UI.form, map=f[kind];
  const cur=map[id]||0, next=Math.max(0,cur+delta);
  if(next===0) delete map[id]; else map[id]=next;
  if(delta>0) f.lineup.add(id); // quem pontua está relacionado
  // patch in place se elemento existe, senão re-render seção
  const span=el((kind==="scorers"?"g-":"a-")+id);
  if(span){ span.textContent=next; span.classList.toggle("zero",next===0); updateTotals();
    if(!f.lineup.has(id)) {} // já garantido acima
    // garante chip ligado
    const chip=document.querySelector(`.chip[data-id="${id}"]`); if(chip) chip.classList.add("on");
  } else { renderLineupSection(); }
}
function addAthlete(){
  if(READONLY) return;
  const inp=el("f-newname"); const name=(inp.value||"").trim();
  if(!name) return;
  if(DATA.roster.some(a=>a.name.toLowerCase()===name.toLowerCase())){ toast("Atleta já existe no elenco"); inp.value=""; return; }
  const a={id:uid("a"),name}; DATA.roster.push(a); UI.form.lineup.add(a.id);
  inp.value=""; renderLineupSection(); toast(`${name} adicionado ao elenco`);
  Store.upsertAthlete(a).catch(saveErr);
}
function saveForm(){
  if(READONLY) return;
  const f=UI.form;
  if(!f.opponent.trim()){ toast("Informe o adversário"); el("f-opp").focus(); return; }
  const isEdit=!!f.id;
  const prev = isEdit? DATA.matches.find(m=>m.id===f.id) : null;
  const rec={
    id: f.id||uid("m"), date:f.date, opponent:f.opponent.trim(),
    goalsFor:f.goalsFor||0, goalsAgainst:f.goalsAgainst||0,
    lineup:[...f.lineup],
    starters:[...f.starters].filter(id=>f.lineup.has(id)),
    scorers:Object.entries(f.scorers).map(([a,g])=>({a,g})),
    assists:Object.entries(f.assists).map(([a,n])=>({a,n})),
    lineupComplete: !!f.lineupComplete, notes:"", archived: prev? !!prev.archived : false,
    status: f.status||"final", events: prev? (prev.events||[]) : [], clock: prev? (prev.clock||null) : null
  };
  if(isEdit){ const i=DATA.matches.findIndex(m=>m.id===f.id); DATA.matches[i]=rec; }
  else DATA.matches.push(rec);
  UI.form=null; render(); afterFormClose();
  Store.upsertMatch(rec).then(()=>toast(isEdit?"Partida atualizada":"Partida salva ✓")).catch(saveErr);
}
function delMatch(id){
  if(READONLY) return;
  const m=DATA.matches.find(x=>x.id===id);
  if(!confirm(`Excluir a partida contra ${m.opponent} (${fmtDate(m.date)})?\n\nEssa ação não pode ser desfeita.`)) return;
  DATA.matches=DATA.matches.filter(x=>x.id!==id); render();
  Store.deleteMatch(id).then(()=>toast("Partida excluída")).catch(saveErr);
}

/* ============ dados / export / import ============ */
function download(filename, text, type="application/json"){
  const blob=new Blob(["\ufeff"+text],{type}); const url=URL.createObjectURL(blob);
  const a=document.createElement("a"); a.href=url; a.download=filename; document.body.appendChild(a); a.click();
  setTimeout(()=>{URL.revokeObjectURL(url); a.remove();},100);
}
function stamp(){ return todayISO(); }
function exportJSON(){ download(`proleta-esporte-${stamp()}.json`, JSON.stringify(DATA,null,2)); toast("Backup baixado ✓"); }
function exportPlayersCSV(s){
  const head=["Atleta","Jogos","Gols","Assistencias","Participacoes","Part_por_jogo","Gols_por_jogo","V","E","D","Aproveitamento","Perc_gols_time"];
  const rows=[...s.players].sort((a,b)=>b.part-a.part).map(p=>[
    p.name,p.jogos,p.gols,p.assist,p.part,dec(p.ppj,2),dec(p.gpj,2),p.v,p.e,p.d,dec(p.aprov*100,1),dec(p.share*100,1)
  ]);
  const csv=[head,...rows].map(r=>r.join(";")).join("\n");
  download(`proleta-atletas-${stamp()}.csv`, csv, "text/csv"); toast("CSV de atletas baixado ✓");
}
function exportMatchesCSV(){
  const head=["Data","Adversario","Gols_Proleta","Gols_Adversario","Resultado","Marcadores","Assistencias","Relacionados"];
  const rows=sortMatches(DATA.matches).map(m=>[
    m.date, m.opponent, m.goalsFor, m.goalsAgainst, resWord(result(m)),
    (m.scorers||[]).map(x=>`${nameOf(x.a)}${x.g>1?" x"+x.g:""}`).join(" / "),
    (m.assists||[]).map(x=>`${nameOf(x.a)}${x.n>1?" x"+x.n:""}`).join(" / "),
    (m.lineup||[]).map(nameOf).join(" / ")
  ].map(v=>`"${String(v).replace(/"/g,'""')}"`));
  const csv=[head.join(";"),...rows.map(r=>r.join(";"))].join("\n");
  download(`proleta-partidas-${stamp()}.csv`, csv, "text/csv"); toast("CSV de partidas baixado ✓");
}
function importJSON(file){
  if(READONLY) return;
  const r=new FileReader();
  r.onload=()=>{
    try{
      const d=JSON.parse(r.result);
      if(!d || !Array.isArray(d.roster) || !Array.isArray(d.matches)) throw new Error("formato");
      if(!confirm("Importar este backup? Os dados atuais deste navegador serão substituídos.")) return;
      DATA=d; DATA.team=TEAM; UI.view="geral"; render(); toast(CLOUD?"Enviando para a nuvem…":"Dados importados ✓");
      Store.replaceAll(DATA).then(()=>{ if(CLOUD) toast("Backup importado para a nuvem ✓"); }).catch(saveErr);
    }catch(e){ alert("Arquivo inválido. Selecione um backup .json exportado por este app."); }
  };
  r.readAsText(file);
}
function resetSeed(){
  if(READONLY) return;
  if(!confirm("Recarregar os 28 jogos de exemplo? Isso substitui os dados atuais. Faça backup antes se precisar.")) return;
  DATA=seedData(); DATA.team=TEAM; UI.view="geral"; render(); toast(CLOUD?"Recarregando na nuvem…":"Dados de exemplo recarregados");
  Store.replaceAll(DATA).then(()=>{ if(CLOUD) toast("Exemplo recarregado ✓"); }).catch(saveErr);
}
function wipe(){
  if(READONLY) return;
  if(!confirm("Apagar TODAS as partidas e manter só o elenco vazio? Essa ação não pode ser desfeita.")) return;
  DATA={version:1, team:TEAM, roster:DATA.roster, matches:[]}; UI.view="geral"; render(); toast(CLOUD?"Apagando na nuvem…":"Partidas apagadas");
  Store.replaceAll(DATA).then(()=>{ if(CLOUD) toast("Partidas apagadas ✓"); }).catch(saveErr);
}

/* ============ login / telas de sistema (modo nuvem) ============ */
function traduzErro(e){
  const m=((e&&e.message)||"").toLowerCase();
  if(m.includes("invalid login")||m.includes("invalid credentials")) return "E-mail ou senha incorretos.";
  if(m.includes("already registered")||m.includes("already been registered")) return "Esse e-mail já tem conta. É só entrar.";
  if(m.includes("email not confirmed")) return "Confirme seu e-mail pelo link que o Supabase enviou e tente entrar.";
  if(m.includes("password")) return "Senha muito curta (mínimo 6 caracteres).";
  return (e&&e.message)?e.message:"Não foi possível autenticar.";
}
function renderFatal(msg){
  UI.form=null;
  app().innerHTML = `<div class="login-screen"><div class="login-card">
    <div class="login-crest"><img class="crest-img" src="${CREST}" alt="Escudo do Proleta"><div><h1>Proleta</h1><span>Estatísticas · ${esc(TEAM.squad)}</span></div></div>
    <h2>Ops…</h2><p class="login-sub">${esc(msg)}</p>
    <p class="login-sub">Recarregue a página quando tiver internet — ou apague as credenciais do Supabase no topo do arquivo para usar em modo local.</p>
  </div></div>`;
}
function renderLogin(){
  UI.form=null;
  app().innerHTML = `<div class="login-screen"><div class="login-card">
    <div class="login-crest"><img class="crest-img" src="${CREST}" alt="Escudo do Proleta"><div><h1>Proleta</h1><span>Estatísticas · ${esc(TEAM.squad)}</span></div></div>
    <h2>Entrar</h2>
    <p class="login-sub">Acesso da comissão técnica · Elenco ${TEAM.squad}</p>
    <label class="lg-lab">E-mail</label>
    <input class="lg-inp" type="email" id="lg-email" autocomplete="username" placeholder="voce@email.com">
    <label class="lg-lab">Senha</label>
    <input class="lg-inp" type="password" id="lg-pass" autocomplete="current-password" placeholder="••••••••">
    <div id="lg-err" class="login-err"></div>
    <button class="btn primary block" id="lg-go">Entrar</button>
  </div></div>`;
  const submit=async ()=>{
    const email=(el("lg-email").value||"").trim(), pass=el("lg-pass").value||"";
    if(!email||!pass){ el("lg-err").textContent="Preencha e-mail e senha."; return; }
    el("lg-go").disabled=true; el("lg-err").textContent="";
    try{ await Store.signIn(email,pass); /* onAuth cuida do boot */ }
    catch(e){ el("lg-err").textContent=traduzErro(e); el("lg-go").disabled=false; }
  };
  el("lg-go").onclick=submit;
  el("lg-pass").onkeydown=e=>{ if(e.key==="Enter") submit(); };
  setTimeout(()=>el("lg-email") && el("lg-email").focus(),50);
}

/* ============ init ============ */
let pendingReload=false, _reloadT=null;
/* rajadas de eventos (um gol dispara vários postgres_changes) viram 1 leitura */
function scheduleReload(){ clearTimeout(_reloadT); _reloadT=setTimeout(()=>reloadFromStore(),250); }
async function reloadFromStore(){
  if(UI.form || UI.livePick){ pendingReload=true; return; }   // não interrompe formulário/anotação aberta
  try{ DATA=await Store.loadState(); DATA.team=TEAM; render(); }
  catch(e){ console.error(e); toast("Erro ao sincronizar."); }
}
function afterFormClose(){ if(pendingReload){ pendingReload=false; reloadFromStore(); } }

async function boot(){
  DATA=await Store.loadState();
  if(!DATA.team) DATA.team=TEAM;
  UI.view="geral"; render();
  Store.subscribe(()=>scheduleReload());
}

function renderSplash(){
  app().innerHTML = `<div class="login-screen"><div class="splash">
    <img class="splash-crest" src="${CREST}" alt="Escudo do Proleta">
    <div class="splash-spin"></div>
    <div class="splash-txt">Carregando estatísticas…</div>
  </div></div>`;
}

(async ()=>{
  document.title = "Proleta " + TEAM.squad + " · Estatísticas";
  document.documentElement.style.setProperty("--crest", `url("${CREST}")`);
  try{ const lk=document.createElement("link"); lk.rel="apple-touch-icon"; lk.href=CREST; document.head.appendChild(lk); }catch(e){}
  el("fileInput").addEventListener("change", e=>{ if(e.target.files[0]) importJSON(e.target.files[0]); e.target.value=""; });
  renderSplash();
  if(!CLOUD){ await boot(); return; }
  try{ Store.initClient(); }catch(e){ renderFatal(e.message); return; }
  if(READONLY){ await boot(); return; }   // modo público: sem login, lê como anônimo
  let booted=false;
  Store.onAuth(async s=>{ if(s){ if(!booted){ booted=true; await boot(); } } else { booted=false; renderLogin(); } });
  await Store.getSession();
  if(SESSION && !booted){ booted=true; await boot(); } else if(!SESSION){ renderLogin(); }
})();
</script>
