<style>
  :root{
    --verde-900:#062a1c; --verde-850:#08351f; --verde-800:#0b4529; --verde-700:#0e5836;
    --verde-500:#1aa04a; --verde-400:#2fbf6b; --verde-300:#5fd48f;
    --creme:#f2ebd6; --creme-2:#fbf7ec; --creme-3:#fffdf6;
    --carvao:#0f2019; --carvao-2:#324b40;
    --linha:rgba(242,235,214,.14); --linha-forte:rgba(242,235,214,.28);
    --v:#2fbf6b; --e:#e6b94b; --d:#e0705f; --gold:#e6b94b;
    --sombra:0 1px 2px rgba(0,0,0,.18), 0 8px 24px rgba(0,0,0,.10);
    --r:14px; --r-sm:10px;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    font-family:'Inter',system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
    background:var(--verde-900); color:var(--creme);
    -webkit-font-smoothing:antialiased; line-height:1.45;
    padding-bottom:env(safe-area-inset-bottom);
  }
  h1,h2,h3{font-family:'Zilla Slab',Georgia,serif; margin:0; letter-spacing:.2px}
  .num{font-family:'Zilla Slab',Georgia,serif; font-variant-numeric:tabular-nums; letter-spacing:.3px}
  button{font-family:inherit; cursor:pointer}
  input,select{font-family:inherit}
  a{color:inherit}

  .wrap{max-width:1000px; margin:0 auto; padding:0 16px}

  /* ---------- header / scoreboard ---------- */
  .app-header{
    position:relative; overflow:hidden;
    background:linear-gradient(180deg,var(--verde-800),var(--verde-850));
    border-bottom:1px solid var(--linha-forte);
  }
  .app-header::before{ /* centerline + circle motif */
    content:""; position:absolute; inset:0; pointer-events:none; opacity:.5;
    background:
      radial-gradient(circle at 50% 50%, transparent 46px, var(--linha) 46px, var(--linha) 47px, transparent 48px),
      linear-gradient(90deg, transparent calc(50% - .5px), var(--linha) calc(50% - .5px), var(--linha) calc(50% + .5px), transparent calc(50% + .5px));
  }
  .hd{position:relative; display:flex; align-items:center; justify-content:space-between; gap:16px; padding:18px 0 20px; flex-wrap:wrap}
  .crest{display:flex; align-items:center; gap:12px; flex-wrap:wrap}
  .crest .mark{ height:48px; width:auto; display:block; flex:none;
    filter:drop-shadow(0 2px 5px rgba(0,0,0,.32)); }
  .crest .txt h1{font-size:22px; line-height:1; color:var(--creme-3)}
  .crest .txt .sub{font-size:11px; letter-spacing:2.5px; text-transform:uppercase; color:var(--verde-300); margin-top:5px; font-weight:600}
  .scoreboard{display:flex; align-items:center; gap:22px; flex-wrap:wrap}
  .aprov{text-align:right}
  .aprov .n{font-size:40px; line-height:.9; color:var(--creme-3); font-weight:700}
  .aprov .l{font-size:10px; letter-spacing:2px; text-transform:uppercase; color:var(--verde-300); font-weight:600; margin-top:4px}
  .kpis{display:flex; gap:10px}
  .kpi{background:rgba(0,0,0,.16); border:1px solid var(--linha); border-radius:10px; padding:7px 11px; text-align:center; min-width:44px}
  .kpi .n{font-size:19px; color:var(--creme-3); line-height:1}
  .kpi .l{font-size:9px; letter-spacing:1.5px; text-transform:uppercase; color:var(--verde-300); margin-top:3px; font-weight:600}
  .form-dots{display:flex; gap:5px; align-items:center}
  .form-dots .lbl{font-size:9px; letter-spacing:1.5px; text-transform:uppercase; color:var(--verde-300); margin-right:2px; font-weight:600}
  .dot{width:16px;height:16px;border-radius:50%; display:grid;place-items:center; font-size:9px; font-weight:700; color:#08240f}
  .dot.v{background:var(--v)} .dot.e{background:var(--e)} .dot.d{background:var(--d)}
  .dot.empty{background:var(--linha)}

  /* ---------- tabs ---------- */
  .tabs-outer{position:sticky; top:0; z-index:20; background:var(--verde-850); border-bottom:1px solid var(--linha)}
  .tabs{display:flex; gap:2px; overflow-x:auto; scrollbar-width:none}
  .tabs::-webkit-scrollbar{display:none}
  .tab{
    background:none; border:none; color:var(--verde-300); font-weight:600; font-size:14px;
    padding:14px 16px; white-space:nowrap; border-bottom:2.5px solid transparent; transition:color .15s, border-color .15s;
  }
  .tab:hover{color:var(--creme)}
  .tab.active{color:var(--creme-3); border-bottom-color:var(--verde-400)}

  /* ---------- content ---------- */
  .content{padding:22px 0 60px; animation:fade .25s ease}
  @keyframes fade{from{opacity:0; transform:translateY(4px)} to{opacity:1; transform:none}}
  .section-title{display:flex; align-items:baseline; justify-content:space-between; gap:12px; margin:6px 0 14px}
  .section-title h2{font-size:19px; color:var(--creme-3)}
  .section-title .hint{font-size:12px; color:var(--verde-300)}

  /* cards */
  .grid{display:grid; grid-template-columns:repeat(auto-fit,minmax(150px,1fr)); gap:12px; margin-bottom:20px}
  .card{background:var(--creme-2); color:var(--carvao); border-radius:var(--r); padding:16px 18px; box-shadow:var(--sombra)}
  .card.dark{background:linear-gradient(165deg,var(--verde-700),var(--verde-800)); color:var(--creme); box-shadow:var(--sombra); border:1px solid var(--linha)}
  .card .stat-num{font-size:34px; line-height:1; font-weight:700}
  .card.dark .stat-num{color:var(--creme-3)}
  .card .stat-label{font-size:11px; letter-spacing:1.5px; text-transform:uppercase; color:var(--carvao-2); font-weight:600; margin-top:8px}
  .card.dark .stat-label{color:var(--verde-300)}
  .card .stat-sub{font-size:12.5px; color:var(--carvao-2); margin-top:6px}
  .card.dark .stat-sub{color:var(--creme); opacity:.75}
  .stat-num.pos{color:var(--verde-500)} .stat-num.neg{color:var(--d)}

  .highlight-row{display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:20px}
  @media(max-width:560px){.highlight-row{grid-template-columns:1fr}}
  .hl{background:var(--creme-2); border-radius:var(--r); padding:15px 18px; display:flex; align-items:center; gap:14px; box-shadow:var(--sombra); color:var(--carvao)}
  .hl .medal{width:46px;height:46px;border-radius:12px; background:var(--verde-700); color:var(--gold); display:grid;place-items:center; font-size:22px; flex-shrink:0}
  .hl .who{font-family:'Zilla Slab',serif; font-size:21px; font-weight:700; line-height:1.05}
  .hl .role{font-size:10.5px; letter-spacing:1.5px; text-transform:uppercase; color:var(--carvao-2); font-weight:600}
  .hl .val{margin-left:auto; text-align:right}
  .hl .val .n{font-family:'Zilla Slab',serif; font-size:26px; font-weight:700; line-height:1}
  .hl .val .u{font-size:10px; letter-spacing:1px; text-transform:uppercase; color:var(--carvao-2); font-weight:600}

  /* tables */
  .panel{background:var(--creme-2); border-radius:var(--r); box-shadow:var(--sombra); overflow:hidden; margin-bottom:20px}
  .panel-head{display:flex; align-items:center; justify-content:space-between; gap:12px; padding:14px 18px; border-bottom:1px solid rgba(15,32,25,.10); flex-wrap:wrap}
  .panel-head h3{color:var(--carvao); font-size:16px}
  .panel-head .sub{color:var(--carvao-2); font-size:12px; font-weight:500; margin-top:2px}
  .table-wrap{overflow-x:auto}
  table.stats{width:100%; border-collapse:collapse; color:var(--carvao); font-size:13.5px; min-width:640px}
  table.stats th,table.stats td{padding:9px 12px; text-align:right; white-space:nowrap}
  table.stats th:first-child,table.stats td:first-child{text-align:left; position:sticky; left:0; background:var(--creme-2)}
  table.stats thead th{
    font-size:11px; letter-spacing:.6px; text-transform:uppercase; color:var(--carvao-2); font-weight:700;
    border-bottom:2px solid rgba(15,32,25,.12); cursor:pointer; user-select:none; background:var(--creme-2);
  }
  table.stats thead th:hover{color:var(--verde-500)}
  table.stats thead th .arw{color:var(--verde-500); font-size:10px}
  table.stats tbody tr{border-bottom:1px solid rgba(15,32,25,.07)}
  table.stats tbody tr:nth-child(even) td{background:rgba(15,32,25,.028)}
  table.stats tbody tr:nth-child(even) td:first-child{background:#efe7d0}
  table.stats tbody tr:hover td{background:rgba(26,160,74,.09)}
  table.stats tbody tr:hover td:first-child{background:rgba(26,160,74,.12)}
  table.stats td.name{font-weight:600}
  table.stats td .rk{color:var(--carvao-2); font-weight:600; display:inline-block; width:20px; font-family:'Zilla Slab',serif}
  .cell-num{font-family:'Zilla Slab',serif; font-variant-numeric:tabular-nums; font-weight:600}
  .muted{color:var(--carvao-2)}
  .pill{display:inline-block; padding:1px 8px; border-radius:20px; font-size:12px; font-weight:600; font-family:'Zilla Slab',serif}
  .pill.v{background:rgba(47,191,107,.16); color:#137a3c} .pill.e{background:rgba(230,185,75,.2); color:#8a6a12} .pill.d{background:rgba(224,112,95,.16); color:#a83f30}

  /* match cards */
  .match-list{display:flex; flex-direction:column; gap:10px}
  .match-card{background:var(--creme-2); border-radius:var(--r); box-shadow:var(--sombra); color:var(--carvao); overflow:hidden; border-left:5px solid var(--linha)}
  .match-card.v{border-left-color:var(--v)} .match-card.e{border-left-color:var(--e)} .match-card.d{border-left-color:var(--d)}
  .mc-top{display:flex; align-items:center; gap:14px; padding:13px 16px}
  .mc-date{font-size:11px; letter-spacing:.5px; color:var(--carvao-2); font-weight:600; width:78px; flex-shrink:0}
  .mc-main{flex:1; min-width:0}
  .mc-score{font-family:'Zilla Slab',serif; font-size:17px; font-weight:700; display:flex; align-items:center; gap:9px; flex-wrap:wrap}
  .mc-score .sc{background:var(--verde-800); color:var(--creme-3); padding:1px 10px; border-radius:8px; font-variant-numeric:tabular-nums}
  .mc-score .opp{font-weight:600}
  .mc-badge{font-size:10px; letter-spacing:1px; text-transform:uppercase; font-weight:700; padding:3px 9px; border-radius:20px; flex-shrink:0}
  .mc-badge.v{background:var(--v); color:#08240f} .mc-badge.e{background:var(--e); color:#3d2f05} .mc-badge.d{background:var(--d); color:#3d0f08}
  .mc-detail{padding:0 16px 13px 108px; font-size:12.5px; color:var(--carvao-2); display:flex; flex-direction:column; gap:3px}
  @media(max-width:520px){.mc-detail{padding-left:16px}}
  .mc-detail .k{font-weight:600; color:var(--carvao)}
  .mc-tags{display:flex; gap:6px; margin-top:6px; flex-wrap:wrap}
  .tag{font-size:10.5px; padding:2px 8px; border-radius:6px; font-weight:600; background:rgba(230,185,75,.22); color:#8a6a12}
  .tag.n{background:rgba(15,32,25,.08); color:var(--carvao-2)}
  .mc-actions{display:flex; gap:8px; padding:0 16px 13px}

  /* buttons */
  .btn{background:var(--verde-700); color:var(--creme); border:1px solid var(--linha); border-radius:10px; padding:10px 16px; font-weight:600; font-size:14px; transition:transform .06s, background .15s, opacity .15s; display:inline-flex; align-items:center; gap:7px}
  .btn:hover{background:var(--verde-500)}
  .btn:active{transform:translateY(1px)}
  .btn.primary{background:var(--verde-500); border-color:transparent; color:#062915}
  .btn.primary:hover{background:var(--verde-400)}
  .btn.ghost{background:transparent; color:var(--carvao); border:1px solid rgba(15,32,25,.2)}
  .btn.ghost:hover{background:rgba(15,32,25,.06)}
  .btn.ghost-light{background:transparent; color:var(--creme); border:1px solid var(--linha-forte)}
  .btn.ghost-light:hover{background:rgba(255,255,255,.06)}
  .btn.danger{background:transparent; color:#c0392b; border:1px solid rgba(192,57,43,.4)}
  .btn.danger:hover{background:rgba(192,57,43,.1)}
  .btn.sm{padding:6px 12px; font-size:12.5px; border-radius:8px}
  .btn.block{width:100%; justify-content:center}
  .btn[disabled]{opacity:.4; cursor:not-allowed}

  .banner{background:rgba(230,185,75,.14); border:1px solid rgba(230,185,75,.4); border-radius:12px; padding:12px 15px; margin-bottom:18px; font-size:13px; color:var(--creme); display:flex; gap:10px; align-items:flex-start}
  .banner .ic{color:var(--gold); font-size:16px; flex-shrink:0; line-height:1.3}

  .empty{text-align:center; padding:50px 20px; color:var(--verde-300)}
  .empty .big{font-size:40px; margin-bottom:10px}
  .empty h3{color:var(--creme-3); margin-bottom:6px; font-size:20px}

  /* dados */
  .data-cards{display:grid; grid-template-columns:repeat(auto-fit,minmax(220px,1fr)); gap:12px}
  .data-card{background:var(--creme-2); border-radius:var(--r); padding:18px; color:var(--carvao); box-shadow:var(--sombra)}
  .data-card h3{font-size:16px; margin-bottom:5px}
  .data-card p{font-size:13px; color:var(--carvao-2); margin:0 0 14px}
  .data-card .btn{margin-top:0}

  /* modal */
  .overlay{position:fixed; inset:0; background:rgba(3,15,9,.62); backdrop-filter:blur(3px); display:grid; place-items:center; z-index:100; padding:16px; animation:fade .18s ease}
  .modal{background:var(--creme-2); color:var(--carvao); border-radius:18px; width:100%; max-width:560px; max-height:92vh; overflow-y:auto; box-shadow:0 20px 60px rgba(0,0,0,.4)}
  .modal-head{position:sticky; top:0; background:var(--verde-800); color:var(--creme-3); padding:16px 20px; display:flex; align-items:center; justify-content:space-between; z-index:2}
  .modal-head h2{font-size:19px}
  .modal-close{background:none; border:none; color:var(--creme); font-size:24px; line-height:1; padding:0 4px}
  .modal-body{padding:20px}
  .field{margin-bottom:16px}
  .field > label{display:block; font-size:11px; letter-spacing:1px; text-transform:uppercase; color:var(--carvao-2); font-weight:700; margin-bottom:7px}
  .field input[type=text],.field input[type=date],.field input[type=number]{
    width:100%; padding:11px 13px; border:1.5px solid rgba(15,32,25,.18); border-radius:10px; font-size:15px; background:var(--creme-3); color:var(--carvao); transition:border-color .15s;
  }
  .field input:focus{outline:none; border-color:var(--verde-500)}
  .placar{display:flex; align-items:center; gap:12px; justify-content:center}
  .placar .side{text-align:center}
  .placar .side .cap{font-size:10px; letter-spacing:1px; text-transform:uppercase; color:var(--carvao-2); font-weight:700; margin-bottom:5px}
  .placar input{width:74px; text-align:center; font-family:'Zilla Slab',serif; font-size:26px; font-weight:700; padding:8px}
  .placar .x{font-family:'Zilla Slab',serif; font-size:22px; color:var(--carvao-2); margin-top:18px}
  .subhead{display:flex; align-items:center; justify-content:space-between; margin:22px 0 10px}
  .subhead .t{font-family:'Zilla Slab',serif; font-size:16px; font-weight:700}
  .subhead .mini{display:flex; gap:6px}
  .chips{display:flex; flex-wrap:wrap; gap:7px}
  .chip{background:var(--creme-3); border:1.5px solid rgba(15,32,25,.16); color:var(--carvao-2); padding:6px 12px; border-radius:20px; font-size:13px; font-weight:600; transition:all .12s}
  .chip:hover{border-color:var(--verde-500)}
  .chip.on{background:var(--verde-700); border-color:var(--verde-700); color:var(--creme-3)}
  .chip.more{background:transparent; border-style:dashed; color:var(--verde-700)}
  .chip.more:hover{background:rgba(15,32,25,.05)}
  /* clicáveis (linhas de tabela e cards que abrem perfil/jogo) */
  .clickable{cursor:pointer}
  tr.clickable:hover td{background:rgba(26,160,74,.12)!important}
  .card.clickable, .hl.clickable{cursor:pointer; transition:transform .12s, box-shadow .12s}
  .card.clickable:hover, .hl.clickable:hover{transform:translateY(-2px); box-shadow:0 4px 14px rgba(0,0,0,.16)}
  .hl .role{color:var(--verde-500)}
  /* botão de titular (estrela) na lista de gols/assist */
  .tit-btn{background:none; border:none; font-size:17px; line-height:1; color:rgba(15,32,25,.28); cursor:pointer; padding:0 2px; vertical-align:middle}
  .tit-btn.on{color:var(--gold)}
  .tit-btn:hover{color:var(--gold)}
  .tit-count{margin-top:8px; font-size:11.5px; color:var(--carvao-2); font-weight:600}
  /* busca de atletas no formulário */
  .lineup-search{width:100%; box-sizing:border-box; padding:9px 12px; margin-bottom:10px; border-radius:var(--r-sm); font-size:14px; border:1px solid rgba(15,32,25,.18); background:var(--creme-3); color:var(--carvao); outline:none}
  .lineup-search:focus{border-color:var(--verde-500); box-shadow:0 0 0 3px rgba(47,191,107,.16)}
  .subhead .sh-hint{font-family:'Inter',sans-serif; font-size:11px; font-weight:500; color:var(--carvao-2)}
  .tag.arq{background:rgba(15,32,25,.12); color:var(--carvao-2)}

  .empty-crest{height:74px; width:auto; opacity:.9; margin-bottom:10px; filter:drop-shadow(0 3px 8px rgba(0,0,0,.25))}
  .splash{display:flex; flex-direction:column; align-items:center; gap:16px; color:var(--creme)}
  .splash-crest{height:96px; width:auto; filter:drop-shadow(0 6px 16px rgba(0,0,0,.4))}
  /* escudo como marca d'água da Visão Geral (identidade verde/creme, sem roubar leitura) */
  .geral-mark{position:relative; overflow:hidden}
  .geral-mark::after{content:""; position:absolute; right:-28px; top:50%; transform:translateY(-50%);
    width:190px; height:190px; background:var(--crest) center/contain no-repeat;
    opacity:.05; pointer-events:none; filter:grayscale(1)}
  @media(max-width:560px){ .geral-mark::after{width:130px; right:-34px; opacity:.04} }
  .splash-spin{width:26px; height:26px; border-radius:50%; border:3px solid var(--linha-forte); border-top-color:var(--verde-400); animation:spin .8s linear infinite}
  .splash-txt{font-size:13px; letter-spacing:.06em; color:var(--verde-300)}
  @keyframes spin{to{transform:rotate(360deg)}}
  .filter-bar{display:flex; align-items:center; gap:8px; flex-wrap:wrap; margin:0 0 14px; padding:10px 12px; background:var(--creme-2); border-radius:var(--r-sm); box-shadow:var(--sombra); color:var(--carvao)}
  .filter-bar .fb-lab{font-size:13px; font-weight:600; color:var(--carvao-2)}
  .filter-bar .fb-sel{padding:6px 10px; border-radius:8px; border:1px solid rgba(15,32,25,.18); background:var(--creme-3); color:var(--carvao); font-size:13px; font-weight:600}
  .filter-bar .fb-num{width:70px; padding:6px 8px; border-radius:8px; border:1px solid rgba(15,32,25,.18); background:var(--creme-3); color:var(--carvao); font-size:14px; font-weight:700; text-align:center}
  .filter-bar .fb-num:disabled{opacity:.45}
  .filter-bar .fb-sel:focus, .filter-bar .fb-num:focus{outline:none; border-color:var(--verde-500); box-shadow:0 0 0 3px rgba(47,191,107,.16)}
  .add-athlete{display:flex; gap:8px; margin-top:10px}
  .add-athlete input{flex:1; padding:9px 12px; border:1.5px dashed rgba(15,32,25,.28); border-radius:10px; background:transparent; font-size:14px; color:var(--carvao)}
  .ga-list{display:flex; flex-direction:column; gap:2px; margin-top:4px}
  .ga-head{display:grid; grid-template-columns:1fr 96px 96px; gap:8px; padding:2px 6px 6px; font-size:10px; letter-spacing:1px; text-transform:uppercase; color:var(--carvao-2); font-weight:700}
  .ga-head span:not(:first-child){text-align:center}
  .ga-row{display:grid; grid-template-columns:1fr 96px 96px; gap:8px; align-items:center; padding:5px 6px; border-radius:8px}
  .ga-row:nth-child(even){background:rgba(15,32,25,.03)}
  .ga-row .nm{font-weight:600; font-size:14px}
  .stepper{display:flex; align-items:center; justify-content:center; gap:2px}
  .stepper button{width:28px;height:28px;border-radius:7px;border:1px solid rgba(15,32,25,.2); background:var(--creme-3); color:var(--carvao); font-size:16px; font-weight:700; line-height:1; display:grid;place-items:center}
  .stepper button:hover{background:var(--verde-500); color:#062915; border-color:transparent}
  .stepper .val{width:26px; text-align:center; font-family:'Zilla Slab',serif; font-size:17px; font-weight:700; font-variant-numeric:tabular-nums}
  .stepper .val.zero{color:rgba(15,32,25,.3)}
  .ga-empty{font-size:13px; color:var(--carvao-2); padding:10px 6px; font-style:italic}
  .warn{background:rgba(230,185,75,.16); border:1px solid rgba(230,185,75,.45); border-radius:9px; padding:9px 12px; font-size:12.5px; color:#7a5c0e; margin-top:10px; display:none}
  .warn.show{display:block}
  .tot-line{font-size:12px; color:var(--carvao-2); margin-top:8px; text-align:center; font-weight:600}
  .complete-toggle{display:flex; align-items:center; gap:9px; margin-top:16px; padding:11px 13px; background:rgba(15,32,25,.04); border-radius:10px; font-size:13px; cursor:pointer; user-select:none}
  .complete-toggle input{width:17px;height:17px; accent-color:var(--verde-500)}
  .modal-foot{display:flex; gap:10px; padding:16px 20px; border-top:1px solid rgba(15,32,25,.1); position:sticky; bottom:0; background:var(--creme-2)}

  .toast{position:fixed; left:50%; bottom:26px; transform:translateX(-50%) translateY(20px); background:var(--verde-700); color:var(--creme-3); padding:12px 22px; border-radius:30px; font-size:14px; font-weight:600; box-shadow:0 8px 30px rgba(0,0,0,.35); opacity:0; transition:opacity .25s, transform .25s; z-index:200; pointer-events:none; border:1px solid var(--linha)}
  .toast.show{opacity:1; transform:translateX(-50%) translateY(0)}

  :focus-visible{outline:2px solid var(--verde-400); outline-offset:2px}
  /* ---- elencos & ao vivo ---- */
  .squad-sel{margin-left:14px; padding:6px 10px; border-radius:8px; font-size:13px; font-weight:700; letter-spacing:.02em;
    background:rgba(242,235,214,.10); color:var(--creme-2); border:1px solid var(--linha-forte); cursor:pointer}
  .squad-sel:focus{outline:none; border-color:var(--verde-400)}
  .squad-sel option{color:var(--carvao); background:var(--creme-3)}
  .tag.live{background:rgba(224,112,95,.18); color:#ffb4a6; font-weight:800}
  .tag.ag{background:rgba(230,185,75,.16); color:var(--e); font-weight:700}
  .mc-badge.live{background:rgba(224,112,95,.2); animation:lvpulse 1.4s ease-in-out infinite}
  .mc-badge.ag{background:rgba(230,185,75,.18)}
  .sc.sched{font-size:15px; opacity:.75; letter-spacing:.06em}
  .up-title{font-size:12px; font-weight:800; letter-spacing:.12em; text-transform:uppercase; color:var(--verde-300); margin:2px 0 8px}
  .lv-panel{padding-bottom:14px}
  .lv-head{display:flex; align-items:center; justify-content:space-between; gap:10px; padding:16px 14px 6px}
  .lv-team{flex:1; text-align:center; font-family:"Zilla Slab",Georgia,serif; font-size:18px; font-weight:700; color:var(--carvao)}
  .lv-squad{font-size:11px; letter-spacing:.12em; text-transform:uppercase; color:var(--carvao-2); font-family:'Inter',sans-serif}
  .lv-mid{flex:1.2; text-align:center}
  .lv-score{font-size:40px; font-weight:800; color:var(--carvao); line-height:1}
  .lv-clock{font-size:22px; font-weight:700; color:var(--verde-700); margin-top:2px}
  .lv-date{font-size:12px; color:var(--carvao-2)}
  .lv-chip{padding:4px 12px; border-radius:20px; font-size:12px; font-weight:800; letter-spacing:.04em}
  .lv-chip.live{background:rgba(224,112,95,.16); color:#c14b38; animation:lvpulse 1.4s ease-in-out infinite}
  .lv-chip.pause{background:rgba(230,185,75,.18); color:#8a6b1f}
  .lv-chip.ag{background:rgba(230,185,75,.14); color:#8a6b1f}
  .lv-chip.fin{background:rgba(15,32,25,.10); color:var(--carvao-2)}

  .lv-actions .btn{flex:1 1 auto; min-width:130px}
  .lv-big{width:100%; padding:14px; font-size:16px}
  .lv-picker{margin:12px 14px 4px; padding:12px; background:var(--creme-2); border-radius:var(--r-sm); border:1px dashed rgba(15,32,25,.25)}

  .lp-div{width:100%; font-size:11px; color:var(--carvao-2); margin:6px 0 2px; letter-spacing:.06em}
  .ev-list{padding:4px 14px 14px}
  .ev{padding:8px 2px; border-bottom:1px dashed rgba(15,32,25,.12); font-size:14px; color:var(--carvao)}
  .ev:last-child{border-bottom:none}
  .ev-min{display:inline-block; min-width:34px; font-weight:800; color:var(--verde-700)}

  .login-screen{min-height:100vh; min-height:100dvh; display:flex; align-items:center; justify-content:center; padding:24px;
    background:radial-gradient(1200px 600px at 50% -10%, var(--verde-800), var(--verde-900)); }
  .login-card{width:100%; max-width:380px; background:var(--creme-3); border-radius:var(--r); box-shadow:var(--sombra);
    padding:28px 24px 24px; border:1px solid rgba(0,0,0,.05); }
  .login-crest{display:flex; align-items:center; gap:12px; margin-bottom:22px}
  .login-crest .crest-img{height:54px; width:auto; flex:none; filter:drop-shadow(0 2px 5px rgba(0,0,0,.18));}
  .login-crest h1{margin:0; font-family:"Zilla Slab",Georgia,serif; font-size:22px; color:var(--verde-800); line-height:1;}
  .login-crest span{font-size:11px; letter-spacing:.14em; text-transform:uppercase; color:var(--carvao-2);}
  .login-card h2{margin:0 0 2px; font-family:"Zilla Slab",Georgia,serif; color:var(--carvao); font-size:24px;}
  .login-sub{margin:0 0 18px; color:var(--carvao-2); font-size:13.5px;}
  .lg-lab{display:block; font-size:12px; font-weight:600; color:var(--carvao-2); margin:12px 0 5px;}
  .lg-inp{width:100%; box-sizing:border-box; padding:11px 12px; border-radius:var(--r-sm); font-size:15px;
    border:1px solid rgba(0,0,0,.16); background:#fff; color:var(--carvao); outline:none;}
  .lg-inp:focus{border-color:var(--verde-500); box-shadow:0 0 0 3px rgba(47,191,107,.18);}
  .login-err{color:#b5432f; font-size:13px; min-height:18px; margin:10px 0 6px;}
  .login-card .btn.block{margin-top:6px}
  .login-alt{margin-top:14px; text-align:center; font-size:13px; color:var(--carvao-2);}
  .linklike{background:none; border:none; color:var(--verde-700); font-weight:600; cursor:pointer; font-size:13px; padding:0;}
  .linklike:hover{text-decoration:underline;}
  @media(prefers-reduced-motion:reduce){*{animation:none!important; transition:none!important}}

    .hd{padding-top:14px}
    .scoreboard{width:100%; justify-content:space-between; gap:14px}
    .aprov .n{font-size:34px}
    .crest .txt h1{font-size:19px}
  }

  lineup_complete:!!m.lineupComplete, notes:m.notes||"", updated_at:new Date().toISOString()
});

const Store = {
  cloud: CLOUD,
  /* ---- infraestrutura / auth (só nuvem) ---- */
  initClient(){
    if(!CLOUD) return;
    if(!window.supabase || !window.supabase.createClient)
      throw new Error("Não consegui carregar a biblioteca do Supabase (sem internet?).");
    sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  },
  async getSession(){ if(!CLOUD) return null; const {data}=await sb.auth.getSession(); SESSION=data.session; return SESSION; },
  onAuth(cb){ if(CLOUD) sb.auth.onAuthStateChange((_e,s)=>{ SESSION=s; cb(s); }); },
  async signIn(email,password){ const {error}=await sb.auth.signInWithPassword({email,password}); if(error) throw error; },
  async signUp(email,password){ const {error}=await sb.auth.signUp({email,password}); if(error) throw error; },
  async signOut(){ if(CLOUD) await sb.auth.signOut(); },
  userEmail(){ return (SESSION&&SESSION.user)?SESSION.user.email:""; },

  /* ---- leitura ---- */
  async loadState(){
    if(!CLOUD){
      let d=null;
      try{ const s=localStorage.getItem(KEY); if(s) d=JSON.parse(s); }catch(e){}
      if(!d){ d=seedData(); try{ localStorage.setItem(KEY, JSON.stringify(d)); }catch(e){} }
      d.team=TEAM; return d;
    }
    const [a,m] = await Promise.all([
      sb.from("athletes").select("*").eq("squad",SQUAD).order("created_at",{ascending:true}),
      sb.from("matches").select("*").eq("squad",SQUAD).order("date",{ascending:true})
    ]);
    if(a.error) throw a.error;
    if(m.error) throw m.error;
    return { version:1, team:TEAM,
      roster:(a.data||[]).map(x=>({id:x.id,name:x.name})),
      matches:(m.data||[]).map(rowToMatch) };
  },

  /* ---- escrita granular ---- */
  _saveLocal(){ try{ localStorage.setItem(KEY, JSON.stringify(DATA)); }catch(e){} },
  async upsertMatch(m){ if(!CLOUD) return this._saveLocal(); const {error}=await sb.from("matches").upsert(matchToRow(m)); if(error) throw error; },
  async deleteMatch(id){ if(!CLOUD) return this._saveLocal(); const {error}=await sb.from("matches").delete().eq("id",id); if(error) throw error; },
  async upsertAthlete(a){ if(!CLOUD) return this._saveLocal(); const {error}=await sb.from("athletes").upsert({id:a.id,name:a.name,squad:SQUAD}); if(error) throw error; },
  async replaceAll(state){
    if(!CLOUD) return this._saveLocal();
    const dm=await sb.from("matches").delete().eq("squad",SQUAD);   if(dm.error) throw dm.error;
    const da=await sb.from("athletes").delete().eq("squad",SQUAD);  if(da.error) throw da.error;
    if(state.roster && state.roster.length){ const {error}=await sb.from("athletes").insert(state.roster.map(a=>({id:a.id,name:a.name,squad:SQUAD}))); if(error) throw error; }
    if(state.matches && state.matches.length){ const {error}=await sb.from("matches").insert(state.matches.map(matchToRow)); if(error) throw error; }
  },
  subscribe(onChange){
    if(!CLOUD || this._sub) return;   // um canal por sessão, nunca duplica
    this._sub = sb.channel("proleta-rt-"+SQUAD)
      .on("postgres_changes",{event:"*",schema:"public",table:"matches",  filter:"squad=eq."+SQUAD}, onChange)
      .on("postgres_changes",{event:"*",schema:"public",table:"athletes", filter:"squad=eq."+SQUAD}, onChange)
      .subscribe();
  }
};
function saveErr(e){ console.error(e); toast("Erro ao salvar. Verifique a conexão."); }

/* ============ estado ============ */
let DATA = null;
let UI = { view:"geral", sortKey:"part", sortDir:-1, form:null, perfil:null, backTo:"geral", lineupSearch:"", lineupShowAll:false, filterKey:"", filterMin:0, live:null, livePick:null, dfMode:"all", dfMonth:"", dfFrom:"", dfTo:"" };

/* jogos que contam (não arquivados) e arquivados */
function activeMatches(){ return DATA.matches.filter(m=>!m.archived); }
function archivedMatches(){ return DATA.matches.filter(m=>m.archived); }
/* status: 'final' (conta nas estatísticas), 'scheduled' (agendada) e 'live' (ao vivo) */
function isFinal(m){ return !m.status || m.status==="final"; }
function liveOrScheduled(){ return activeMatches().filter(m=>!isFinal(m)); }
/* jogos que contam E dentro do período selecionado (filtro global) */
function filteredMatches(){ return matchDateFilter(activeMatches()); }
function countableMatches(){ return matchDateFilter(activeMatches().filter(isFinal)); }
function periodActive(){ return UI.dfMode && UI.dfMode!=="all"; }
function refYear(){ const am=activeMatches(); return am.length? Math.max(...am.map(m=>+m.date.slice(0,4))) : new Date().getFullYear(); }
/* frequência de relacionados (só jogos que contam) → id:contagem */
function freqMap(){
  const f={};
  for(const m of activeMatches().filter(isFinal)) for(const id of (m.lineup||[])) f[id]=(f[id]||0)+1;
  return f;
}

/* ============ utils ============ */
const $ = (sel,root=document)=>root.querySelector(sel);
const el = (id)=>document.getElementById(id);
const app = ()=>el("app");
function uid(p){ return p + Date.now().toString(36) + Math.floor(Math.random()*1e4).toString(36); }
function esc(s){ return String(s==null?"":s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }
let _nIdx=null, _nIdxSrc=null;
function nameOf(id){
  if(_nIdxSrc!==DATA.roster){ _nIdxSrc=DATA.roster; _nIdx=new Map(DATA.roster.map(a=>[a.id,a.name])); }
  return _nIdx.get(id)||"?";
}
/* data de HOJE no fuso do usuário. new Date().toISOString() devolve UTC:
   às 21h em São Paulo (UTC-3) já é o dia seguinte — e os jogos são à noite. */
function todayISO(){ const d=new Date(); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`; }
function fmtDate(iso){ if(!iso) return ""; const [y,m,d]=iso.split("-"); return `${d}/${m}/${y}`; }
function fmtDateShort(iso){ if(!iso) return ""; const [y,m,d]=iso.split("-"); return `${d}/${m}`; }
function result(m){ return m.goalsFor>m.goalsAgainst?"V":m.goalsFor===m.goalsAgainst?"E":"D"; }
function pts(m){ const r=result(m); return r==="V"?3:r==="E"?1:0; }
function pct(x){ return (x*100).toFixed(1).replace(".",",")+"%"; }
function dec(x,n=2){ return Number(x).toFixed(n).replace(".",","); }
function resWord(r){ return r==="V"?"Vitória":r==="E"?"Empate":"Derrota"; }
function sortMatches(list){ return [...list].sort((a,b)=> a.date<b.date?-1: a.date>b.date?1: (a.id<b.id?-1:1)); }

function toast(msg){
  const t=el("toast"); t.textContent=msg; t.classList.add("show");
  clearTimeout(toast._t); toast._t=setTimeout(()=>t.classList.remove("show"),2200);
}

/* ============ cálculo de estatísticas ============ */
function compute(){
  const players = DATA.roster.map(a=>({id:a.id,name:a.name,jogos:0,gols:0,assist:0,v:0,e:0,d:0,ptsP:0,cs:0}));
  const pIdx = Object.fromEntries(players.map(p=>[p.id,p]));
  const opps = {};
  let J=0,V=0,E=0,D=0,GP=0,GC=0;
  const sorted = sortMatches(countableMatches());
  for(const m of sorted){
    J++; GP+=m.goalsFor; GC+=m.goalsAgainst;
    const r=result(m), p=pts(m), clean=(m.goalsAgainst===0);
    if(r==="V")V++; else if(r==="E")E++; else D++;
    const o = opps[m.opponent] || (opps[m.opponent]={opponent:m.opponent,J:0,V:0,E:0,D:0,GP:0,GC:0,last:m.date});
    o.J++; o.GP+=m.goalsFor; o.GC+=m.goalsAgainst; o[r]++; if(m.date>o.last)o.last=m.date;
    for(const id of (m.lineup||[])){ const pl=pIdx[id]; if(!pl)continue; pl.jogos++; pl.ptsP+=p; pl[r.toLowerCase()]++; if(clean)pl.cs++; }
    for(const s of (m.scorers||[])){ const pl=pIdx[s.a]; if(pl)pl.gols+=s.g; }
    for(const s of (m.assists||[])){ const pl=pIdx[s.a]; if(pl)pl.assist+=s.n; }
  }
  players.forEach(p=>{
    p.part=p.gols+p.assist;
    p.ppj = p.jogos? p.part/p.jogos : 0;
    p.gpj = p.jogos? p.gols/p.jogos : 0;
    p.aprov = p.jogos? p.ptsP/(p.jogos*3) : 0;
    p.share = GP? p.gols/GP : 0;
    p.csPct = p.jogos? p.cs/p.jogos : 0;
  });
  const team={J,V,E,D,GP,GC,SG:GP-GC,pts:V*3+E, aprov:J?(V*3+E)/(J*3):0, mgp:J?GP/J:0, mgc:J?GC/J:0};
  const results = sorted.map(result);
  team.form = results.slice(-5);
  let st=0, last=results.length?results[results.length-1]:null;
  for(let i=results.length-1;i>=0 && results[i]===last;i--) st++;
  team.streak = last?{r:last,n:st}:null;
  let mg=null, pd=null;
  for(const m of sorted){ const diff=m.goalsFor-m.goalsAgainst;
    if(result(m)==="V" && (!mg||diff>mg.diff)) mg={m,diff};
    if(result(m)==="D" && (!pd||diff<pd.diff)) pd={m,diff};
  }
  team.maiorGoleada=mg; team.piorDerrota=pd;
  const opponents = Object.values(opps).map(o=>({...o,SG:o.GP-o.GC,aprov:o.J?(o.V*3+o.E)/(o.J*3):0}));
  const withGols = players.filter(p=>p.gols>0);
  const withAss = players.filter(p=>p.assist>0);
  const artilheiro = withGols.length? [...withGols].sort((a,b)=>b.gols-a.gols||b.part-a.part)[0]:null;
  const garcom = withAss.length? [...withAss].sort((a,b)=>b.assist-a.assist||b.part-a.part)[0]:null;
  const partialLineups = activeMatches().filter(m=>isFinal(m) && m.lineupComplete===false).length;
  return {team,players,opponents,artilheiro,garcom,partialLineups,pIdx,totalJogadores:players.filter(p=>p.jogos>0||p.gols>0||p.assist>0).length};
}

/* ============ render raiz ============ */
function render(){
  const s = compute();
  let content="";
  if(UI.live) content=viewLive(s);
  else if(UI.perfil) content=viewPerfil(s, UI.perfil);
  else if(UI.view==="geral") content=viewGeral(s);
  else if(UI.view==="atletas") content=viewAtletas(s);
  else if(UI.view==="partidas") content=viewPartidas(s);
  else if(UI.view==="adversarios") content=viewAdversarios(s);
  else if(UI.view==="arquivados") content=viewArquivados(s);
  else if(UI.view==="dados") content=viewDados(s);
  app().innerHTML = headerHTML(s) + tabsHTML() + `<div class="content"><div class="wrap">${periodViews()?dateFilterBar(refYear()):""}${content}</div></div>` + (UI.form?formHTML():"");
  bind(s);
}
function periodViews(){ return !UI.live && (!!UI.perfil || ["geral","atletas","partidas","adversarios"].includes(UI.view)); }

  <header class="app-header"><div class="wrap"><div class="hd">
    <div class="crest">
      <img class="mark" src="${CREST}" alt="Escudo do Proletariado Alviverde">
      <div class="txt"><h1>${esc(DATA.team.name)}</h1><div class="sub">${esc(DATA.team.short)} · ${esc(DATA.team.squad)} · Sequência: ${streak}${READONLY?` · <span class="ro-badge">👁 somente leitura</span>`:""}</div></div>
      <select id="squad-sel" class="squad-sel" title="Trocar de elenco">${Object.entries(SQUADS).map(([k,l])=>`<option value="${k}" ${k===SQUAD?"selected":""}>${l}</option>`).join("")}</select>

        <div class="kpi"><div class="n num" style="color:var(--e)">${t.E}</div><div class="l">Emp</div></div>
        <div class="kpi"><div class="n num" style="color:var(--d)">${t.D}</div><div class="l">Der</div></div>
        <div class="kpi"><div class="n num">${t.SG>0?"+":""}${t.SG}</div><div class="l">Saldo</div></div>

function tabsHTML(){
  const nArq = archivedMatches().length;
  const tabs=[["geral","Visão Geral"],["atletas","Atletas"],["partidas","Partidas"],["adversarios","Adversários"]];
  if(nArq>0 && !READONLY) tabs.push(["arquivados",`Arquivados · ${nArq}`]);
  if(!READONLY) tabs.push(["dados","Dados"]);
  const activeTab = (UI.perfil||UI.live) ? "" : UI.view;
  return `<div class="tabs-outer"><div class="wrap"><div class="tabs">${
    tabs.map(([k,l])=>`<button class="tab ${activeTab===k?"active":""}" data-act="tab" data-tab="${k}">${l}</button>`).join("")
  }</div></div></div>`;
}

      <div class="card"><div class="stat-num num">${t.GP}<span style="font-size:20px; color:var(--carvao-2)"> : </span>${t.GC}</div><div class="stat-label">Gols pró : contra</div><div class="stat-sub">${dec(t.mgp,2)} feitos · ${dec(t.mgc,2)} sofridos / jogo</div></div>
      <div class="card"><div class="stat-num num ${t.SG>0?"pos":t.SG<0?"neg":""}">${t.SG>0?"+":""}${t.SG}</div><div class="stat-label">Saldo de gols</div><div class="stat-sub">${t.V}V · ${t.E}E · ${t.D}D em ${t.J} jogos</div></div>
      <div class="card"><div class="stat-num num">${dec(t.J? (t.GP+t.GC)/t.J :0,1)}</div><div class="stat-label">Gols por jogo</div><div class="stat-sub">soma das duas equipes</div></div>
    </div>`;
  const hl = `

      ${s.garcom?`<div class="hl clickable" data-act="perfil" data-id="${s.garcom.id}"><div class="medal">🅰️</div><div><div class="who">${esc(s.garcom.name)}</div><div class="role">Garçom ›</div></div><div class="val"><div class="n num">${s.garcom.assist}</div><div class="u">assist.</div></div></div>`:""}

      ${pd?`<div class="card clickable" data-act="match" data-id="${pd.m.id}"><div class="stat-label">Pior derrota ›</div><div class="stat-num num neg" style="font-size:26px; margin-top:6px">${pd.m.goalsFor}–${pd.m.goalsAgainst}</div><div class="stat-sub">vs ${esc(pd.m.opponent)} · ${fmtDate(pd.m.date)}</div></div>`:""}

/* ---------- Atletas ---------- */
const COLS = [
  {k:"name",l:"Atleta",t:"txt"},{k:"jogos",l:"J",t:"n",tip:"Presenças (jogos relacionados)"},
  {k:"gols",l:"G",t:"n"},{k:"assist",l:"A",t:"n"},{k:"part",l:"Part.",t:"n"},
  {k:"ppj",l:"Part./J",t:"d"},{k:"gpj",l:"G/J",t:"d"},
  {k:"v",l:"V",t:"n"},{k:"e",l:"E",t:"n"},{k:"d",l:"D",t:"n"},
  {k:"cs",l:"CS",t:"n",tip:"Clean sheets — jogos em que o time não sofreu gol com o atleta relacionado"},
  {k:"csPct",l:"% CS",t:"p",tip:"Percentual de jogos do atleta sem sofrer gol"},
  {k:"aprov",l:"Aprov.",t:"p"},{k:"share",l:"% Gols",t:"p"}
];
const FILTERS=[["jogos","Jogos"],["gols","Gols"],["assist","Assistências"],["part","Participações"],["cs","Clean sheets"],["v","Vitórias"]];
function viewAtletas(s){
  const banner = s.partialLineups>0? `<div class="banner"><span class="ic">ⓘ</span><div><b>${s.partialLineups} jogo${s.partialLineups>1?"s":""} sem escalação completa.</b> Edite a partida e marque os relacionados + "escalação completa" para deixar as presenças 100% exatas. Gols e assistências já estão corretos.</div></div>`:"";
  let list=[...s.players].filter(p=>p.jogos>0||p.gols>0||p.assist>0); // só quem tem registro no período
  const fltActive = UI.filterKey && UI.filterMin>0;
  if(fltActive) list=list.filter(p=>(p[UI.filterKey]||0)>=UI.filterMin);
  const dir=UI.sortDir;
  list.sort((a,b)=>{
    if(UI.sortKey==="name") return dir*a.name.localeCompare(b.name,"pt");
    const va=a[UI.sortKey], vb=b[UI.sortKey];
    return va===vb? a.name.localeCompare(b.name,"pt") : dir*(va-vb);
  });
  const rows = list.map((p,i)=>{
    const cells = COLS.map(c=>{
      if(c.k==="name") return `<td class="name"><span class="rk">${i+1}</span>${esc(p.name)}</td>`;
      let v=p[c.k], disp;
      if(c.t==="n") disp=v; else if(c.t==="d") disp=v?dec(v,2):"–"; else disp=p.jogos||c.k==="share"?pct(v):"–";
      const cls = (v===0)?"cell-num muted":"cell-num";
      return `<td class="${cls}">${disp}</td>`;
    }).join("");
    return `<tr class="clickable" data-act="perfil" data-id="${p.id}">${cells}</tr>`;
  }).join("");
  const emptyMsg = fltActive ? "Nenhum atleta com esse critério." : (periodActive()? "Nenhum atleta com registro no período selecionado." : "Nenhum atleta com registro ainda.");
  const body = rows || `<tr><td colspan="${COLS.length}" style="text-align:center;padding:22px;color:var(--carvao-2)">${emptyMsg}</td></tr>`;
  const head = COLS.map(c=>{
    const active=UI.sortKey===c.k;
    const arw = active? (UI.sortDir<0?" ▼":" ▲") : "";
    const sort = active? (UI.sortDir<0?"descending":"ascending") : "none";
    return `<th data-act="sort" data-key="${c.k}" tabindex="0" role="columnheader" aria-sort="${sort}" title="${c.tip||c.l}">${c.l}<span class="arw">${arw}</span></th>`;
  }).join("");
  const filterBar = `<div class="filter-bar">
    <span class="fb-lab">Filtrar por</span>
    <select id="flt-key" class="fb-sel">
      <option value="">— sem filtro —</option>
      ${FILTERS.map(([k,l])=>`<option value="${k}" ${UI.filterKey===k?"selected":""}>${l}</option>`).join("")}
    </select>
    <span class="fb-lab">no mínimo</span>
    <input id="flt-min" class="fb-num" type="number" min="0" step="1" value="${UI.filterMin||0}" ${UI.filterKey?"":"disabled"}>
    ${fltActive?`<button class="btn sm ghost" data-act="flt-clear">Limpar</button>`:""}

      <b>V/E/D</b> resultados com o atleta em campo · <b>CS</b> clean sheets (jogos sem sofrer gol) e <b>% CS</b> a proporção deles ·
      <b>Aprov.</b> aproveitamento do time quando ele joga · <b>% Gols</b> fatia dos gols do time.
    </div>`;
}

/* ---------- Partidas ---------- */
function lineupSummary(m){
  const st=(m.starters||[]);
  const bench=(m.lineup||[]).filter(id=>!st.includes(id));
  let html="";
  if(st.length) html+=`<div><span class="k">👥 Titulares:</span> ${st.map(id=>esc(nameOf(id))).join(", ")}</div>`;
  if(bench.length) html+=`<div><span class="k">🔁 Banco:</span> ${bench.map(id=>esc(nameOf(id))).join(", ")}</div>`;
  if(!st.length && !bench.length) html=`<div class="muted">Sem relacionados</div>`;
  return html;
}
function matchCard(m){
  const fin=isFinal(m), live=m.status==="live", sched=m.status==="scheduled";
  const r=fin?result(m):"", rl=fin?r.toLowerCase():(live?"live":"ag");
  const sc = (m.scorers||[]).slice().sort((a,b)=>b.g-a.g).map(x=>`${esc(nameOf(x.a))}${x.g>1?` (${x.g})`:""}`).join(", ");
  const as = (m.assists||[]).slice().sort((a,b)=>b.n-a.n).map(x=>`${esc(nameOf(x.a))}${x.n>1?` (${x.n})`:""}`).join(", ");
  const nRel=(m.lineup||[]).length, nTit=(m.starters||[]).length;
  const tags = `<div class="mc-tags">
    ${live?`<span class="tag live">🔴 AO VIVO</span>`:""}
    ${sched?`<span class="tag ag">📅 Agendada</span>`:""}
    <span class="tag n">${nRel} relacionado${nRel!==1?"s":""}</span>
    ${nTit?`<span class="tag n">${nTit} titular${nTit!==1?"es":""}</span>`:""}
    ${m.lineupComplete===false?`<span class="tag">escalação parcial</span>`:""}
    ${m.archived?`<span class="tag arq">arquivado</span>`:""}
  </div>`;
  const arcBtn = m.archived
    ? `<button class="btn sm ghost" data-act="unarchive" data-id="${m.id}">Desarquivar</button>`
    : `<button class="btn sm ghost" data-act="archive" data-id="${m.id}">Arquivar</button>`;
  return `<div class="match-card ${rl}">
    <div class="mc-top">
      <div class="mc-date">${fmtDate(m.date)}</div>
      <div class="mc-main"><div class="mc-score"><span class="sc${sched?" sched":""}">${sched?"vs":`${m.goalsFor} – ${m.goalsAgainst}`}</span> <span class="opp">${esc(m.opponent||"Adversário")}</span></div></div>
      <div class="mc-badge ${rl}">${fin?r:(live?"🔴":"📅")}</div>
    </div>
    <div class="mc-detail">
      ${sc?`<div><span class="k">⚽ Gols:</span> ${sc}</div>`:`<div class="muted">Sem gols registrados</div>`}
      ${as?`<div><span class="k">🅰️ Assist.:</span> ${as}</div>`:""}
      ${lineupSummary(m)}
      ${tags}
    </div>
    ${(()=>{
      const liveBtn=(live||sched)&&!READONLY?`<button class="btn sm primary" data-act="live" data-id="${m.id}">${live?"Abrir ao vivo 🔴":"⚡ Ao vivo"}</button>`:(live&&READONLY?`<button class="btn sm primary" data-act="live" data-id="${m.id}">Acompanhar ao vivo 🔴</button>`:"");
      if(READONLY) return liveBtn?`<div class="mc-actions">${liveBtn}</div>`:"";
      return `<div class="mc-actions">${liveBtn}
        ${live?"":`<button class="btn sm ghost" data-act="edit" data-id="${m.id}">Editar</button>`}
        ${fin?arcBtn:""}
        <button class="btn sm danger" data-act="del" data-id="${m.id}">Excluir</button></div>`;
    })()}
  </div>`;
}
function viewPartidas(s){
  if(activeMatches().length===0) return `<div class="section-title"><h2>Partidas</h2>${READONLY?"":`<button class="btn primary sm" data-act="new">+ Nova partida</button>`}</div>${emptyState("Nenhuma partida","Cadastre o primeiro jogo deste elenco.","partidas")}`;
  const upcoming = sortMatches(liveOrScheduled());
  const finals = sortMatches(activeMatches().filter(isFinal)).reverse();
  const list = sortMatches(countableMatches()).reverse();
  const upHtml = upcoming.length? `<div class="up-title">⚡ Ao vivo &amp; agendadas</div><div class="match-list" style="margin-bottom:18px">${upcoming.map(matchCard).join("")}</div>${finals.length?`<div class="up-title">Encerradas</div>`:""}` : "";
  const cards = list.length? list.map(matchCard).join("") : (finals.length? `<div class="empty" style="padding:26px"><div class="big" style="font-size:40px">📅</div><p>Nenhuma partida encerrada no período selecionado.</p></div>` : "");
  const hint = periodActive()? `${list.length} de ${finals.length} jogos no período` : `· ${finals.length} jogo${finals.length!==1?"s":""}`;
  return `<div class="section-title"><h2>Partidas <span class="hint" style="font-weight:400">${hint}</span></h2>${READONLY?"":`<button class="btn primary sm" data-act="new">+ Nova partida</button>`}</div>
    ${upHtml}
    <div class="match-list">${cards}</div>`;
}
function dateFilterBar(ano){
  const m=UI.dfMode||"all";
  const opt=(v,l)=>`<option value="${v}" ${m===v?"selected":""}>${l}</option>`;
  let extra="";
  if(m==="month") extra=`<input type="month" id="df-month" class="fb-num" style="width:auto" value="${UI.dfMonth||""}">`;
  else if(m==="range") extra=`<span class="fb-lab">de</span><input type="date" id="df-from" class="fb-num" style="width:auto" value="${UI.dfFrom||""}"><span class="fb-lab">até</span><input type="date" id="df-to" class="fb-num" style="width:auto" value="${UI.dfTo||""}">`;
  return `<div class="filter-bar">
    <span class="fb-lab">Período</span>
    <select id="df-mode" class="fb-sel">
      ${opt("all","Todos")}${opt("last30","Últimos 30 dias")}${opt("last90","Últimos 90 dias")}
      ${opt("sem1","1º semestre "+ano)}${opt("sem2","2º semestre "+ano)}
      ${opt("month","Mês específico")}${opt("range","Entre datas")}
    </select>
    ${extra}
    ${m!=="all"?`<button class="btn sm ghost" data-act="df-clear">Limpar</button>`:""}
  </div>`;
}
function matchDateFilter(list){
  const m=UI.dfMode||"all";
  if(m==="all") return list;
  if(m==="month") return UI.dfMonth? list.filter(x=>x.date.slice(0,7)===UI.dfMonth) : list;
  if(m==="range"){ const f=UI.dfFrom, t=UI.dfTo; if(!f&&!t) return list; return list.filter(x=>(!f||x.date>=f)&&(!t||x.date<=t)); }
  const hoje=todayISO();
  if(m==="last30"||m==="last90"){
    const c=new Date(); c.setDate(c.getDate()-(m==="last30"?30:90));
    const ini=`${c.getFullYear()}-${String(c.getMonth()+1).padStart(2,"0")}-${String(c.getDate()).padStart(2,"0")}`;
    return list.filter(x=>x.date>=ini && x.date<=hoje);
  }
  const ano = refYear();   // mesmo ano exibido no rótulo do filtro (nunca divergem)
  if(m==="sem1") return list.filter(x=>x.date>=`${ano}-01-01` && x.date<=`${ano}-06-30`);
  if(m==="sem2") return list.filter(x=>x.date>=`${ano}-07-01` && x.date<=`${ano}-12-31`);
  return list;
}

/* ---------- Arquivados ---------- */
function viewArquivados(s){
  const list = sortMatches(archivedMatches()).reverse();
  if(list.length===0) return emptyState("Nada arquivado","Jogos arquivados ficam aqui, fora das estatísticas.","partidas");
  const cards = list.map(matchCard).join("");
  return `<div class="section-title"><h2>Arquivados <span class="hint" style="font-weight:400">· ${list.length} jogos</span></h2></div>
    <div class="banner"><span class="ic">📦</span><div>Estes jogos <b>não entram nas estatísticas</b> (nem em médias, artilharia ou frequência). Use "Desarquivar" para trazer de volta.</div></div>
    <div class="match-list">${cards}</div>`;
}

/* ---------- Ao vivo (cronômetro + eventos) ---------- */
function liveMatch(){ return DATA.matches.find(x=>x.id===UI.live); }
function clockElapsed(c){ if(!c) return 0; const b=c.base||0; return (c.running&&c.startedAt)? b+Math.max(0,(Date.now()-new Date(c.startedAt).getTime())/1000) : b; }
function fmtClock(sec){ sec=Math.floor(sec||0); const m=Math.floor(sec/60), ss=sec%60; return String(m).padStart(2,"0")+":"+String(ss).padStart(2,"0"); }
function evMinute(t){ return Math.max(1,Math.floor((t||0)/60)+1)+"'"; }
function onFieldOf(m){ const onf=new Set(m.starters||[]); for(const ev of (m.events||[])){ if(ev.type==="sub"){ onf.delete(ev.out); onf.add(ev.in); } } return onf; }
function syncFromEvents(m){
  let gf=0,ga=0; const sc={},as={}; const lu=new Set(m.lineup||[]);
  for(const ev of (m.events||[])){
    if(ev.type==="goal"){ gf++; if(ev.a) sc[ev.a]=(sc[ev.a]||0)+1; if(ev.as) as[ev.as]=(as[ev.as]||0)+1; }
    else if(ev.type==="ga") ga++;
    else if(ev.type==="sub"){ lu.add(ev.in); }
  }
  m.goalsFor=gf; m.goalsAgainst=ga;
  m.scorers=Object.entries(sc).map(([a,g])=>({a,g}));
  m.assists=Object.entries(as).map(([a,n])=>({a,n}));
  m.lineup=[...lu];
}
function saveLive(m){ render(); Store.upsertMatch(m).catch(saveErr); }
function pushEvent(m,ev){ ev.t=Math.floor(clockElapsed(m.clock)); m.events=[...(m.events||[]),ev]; syncFromEvents(m); saveLive(m); }
function liveStart(){ const m=liveMatch(); if(!m||READONLY) return;
  m.status="live"; m.clock={running:true, base:0, startedAt:new Date().toISOString()};
  m.events=[...(m.events||[]),{type:"start",t:0}]; saveLive(m); toast("Bola rolando! ▶"); }
function livePauseResume(){ const m=liveMatch(); if(!m||READONLY||!m.clock) return;
  if(m.clock.running){ const t=Math.floor(clockElapsed(m.clock)); m.clock={running:false, base:t}; m.events=[...(m.events||[]),{type:"pause",t}]; }
  else { m.events=[...(m.events||[]),{type:"resume",t:m.clock.base||0}]; m.clock={running:true, base:m.clock.base||0, startedAt:new Date().toISOString()}; }
  saveLive(m); }
function liveGA(){ const m=liveMatch(); if(!m||READONLY) return; pushEvent(m,{type:"ga"}); toast("Gol sofrido anotado"); }
function liveUndo(){ const m=liveMatch(); if(!m||READONLY) return;
  const evs=m.events||[];
  for(let i=evs.length-1;i>=0;i--){ if(["goal","ga","sub"].includes(evs[i].type)){ m.events=[...evs.slice(0,i),...evs.slice(i+1)]; syncFromEvents(m); saveLive(m); toast("Última anotação desfeita ↩"); return; } }
  toast("Nada para desfazer"); }
function liveEnd(){ const m=liveMatch(); if(!m||READONLY) return;
  if(!confirm(`Encerrar a partida contra ${m.opponent}? O placar ${m.goalsFor}–${m.goalsAgainst} entra nas estatísticas.`)) return;
  const t=Math.floor(clockElapsed(m.clock)); m.clock={running:false, base:t}; m.status="final";
  m.events=[...(m.events||[]),{type:"end",t}]; saveLive(m); toast("Partida encerrada 🏁"); }
function lpPick(id){
  const m=liveMatch(); const p=UI.livePick; if(!m||!p||READONLY) return;
  if(p.kind==="goal"){
    if(p.step===1){ if(!id) return; UI.livePick={kind:"goal",step:2,a:id}; render(); }
    else { const a=p.a; UI.livePick=null; pushEvent(m,{type:"goal",a,as:id||null}); toast("Gol anotado ⚽"); afterFormClose(); }
  } else {
    if(p.step===1){ if(!id) return; UI.livePick={kind:"sub",step:2,a:id}; render(); }
    else { if(!id) return; const out=p.a; UI.livePick=null; pushEvent(m,{type:"sub",out,in:id}); toast("Substituição anotada 🔁"); afterFormClose(); }
  }
}
function evLine(ev){
  const min=evMinute(ev.t);
  switch(ev.type){
    case "goal": return `<span class="ev-min num">${min}</span> ⚽ Gol de <b>${esc(nameOf(ev.a))}</b>${ev.as?` <span class="muted">(assist. ${esc(nameOf(ev.as))})</span>`:""}`;
    case "ga":   return `<span class="ev-min num">${min}</span> 🥅 Gol sofrido`;
    case "sub":  return `<span class="ev-min num">${min}</span> 🔁 Sai <b>${esc(nameOf(ev.out))}</b>, entra <b>${esc(nameOf(ev.in))}</b>`;
    case "start":return `<span class="ev-min num">${min}</span> ▶ Início da partida`;
    case "pause":return `<span class="ev-min num">${min}</span> ⏸ Cronômetro pausado`;
    case "resume":return `<span class="ev-min num">${min}</span> ▶ Cronômetro retomado`;
    case "end":  return `<span class="ev-min num">${min}</span> 🏁 Fim de jogo`;
  }
  return "";
}
function livePickerHTML(m,onf){
  const p=UI.livePick;
  const chip=id=>`<button class="chip" data-act="lp-pick" data-id="${id}">${esc(nameOf(id))}</button>`;
  const luOrder=[...onf, ...(m.lineup||[]).filter(id=>!onf.has(id))];
  let title="",body="";
  if(p.kind==="goal"){
    if(p.step===1){ title="⚽ Quem marcou?"; body=luOrder.map(chip).join("")||`<span class="muted">Marque relacionados na partida primeiro.</span>`; }
    else { title=`⚽ Gol de ${esc(nameOf(p.a))} — assistência de…`; body=luOrder.filter(id=>id!==p.a).map(chip).join("")+`<button class="chip more" data-act="lp-none">Sem assistência</button>`; }
  } else {
    if(p.step===1){ title="🔁 Quem sai?"; body=[...onf].map(chip).join("")||`<span class="muted">Ninguém em campo — marque titulares (★) na partida.</span>`; }
    else {
      title=`🔁 Sai ${esc(nameOf(p.a))} — quem entra?`;
      const bench=(m.lineup||[]).filter(id=>!onf.has(id));
      const rest=DATA.roster.map(a=>a.id).filter(id=>!onf.has(id)&&!bench.includes(id));
      body=bench.map(chip).join("")+(rest.length?`<div class="lp-div">— demais do elenco —</div>`+rest.map(chip).join(""):"");
    }
  }
  return `<div class="lv-picker"><div class="lp-title">${title}</div><div class="chips">${body}</div><button class="btn sm ghost" data-act="lp-cancel" style="margin-top:10px">Cancelar</button></div>`;
}
function viewLive(s){

    <div class="panel lv-panel">
      <div class="lv-head">
        <div class="lv-team">Proleta<br><span class="lv-squad">${esc(DATA.team.squad)}</span></div>

          <div class="lv-clock num" id="live-clock" role="timer" aria-label="Tempo de jogo">${fmtClock(clockElapsed(m.clock))}</div>
          <div class="lv-date">${fmtDate(m.date)}</div></div>

      </div>
      ${controls}
      ${picker}
    </div>
    <div class="panel" style="margin-top:14px"><div class="panel-head"><div><h3>Em campo</h3></div></div><div class="chips" style="padding:0 14px 12px">${onfChips}</div>${bench?`<div class="panel-head" style="padding-top:0"><div><h3 style="font-size:14px">Banco</h3></div></div><div class="chips" style="padding:0 14px 14px">${bench}</div>`:""}</div>

/* ---------- Perfil do jogador ---------- */
function viewPerfil(s, pid){
  const p = s.pIdx[pid];
  if(!p) return `<div class="section-title"><button class="btn sm ghost" data-act="voltar">← Voltar</button></div>${emptyState("Atleta não encontrado","Talvez tenha sido removido.","atletas")}`;
  // histórico jogo a jogo (só jogos que contam)
  const log = sortMatches(countableMatches()).reverse().map(m=>{
    const inL=(m.lineup||[]).includes(pid);
    const isTit=(m.starters||[]).includes(pid);
    const g=(m.scorers||[]).filter(x=>x.a===pid).reduce((n,x)=>n+x.g,0);
    const a=(m.assists||[]).filter(x=>x.a===pid).reduce((n,x)=>n+x.n,0);
    if(!inL && !g && !a) return null;
    const r=result(m), rl=r.toLowerCase();
    const papel = inL ? (isTit?`<span class="pill v" style="padding:2px 8px">Titular</span>`:`<span class="pill e" style="padding:2px 8px">Banco</span>`) : `<span class="muted">—</span>`;
    return `<tr class="clickable" data-act="match" data-id="${m.id}">
      <td class="cell-num muted" style="white-space:nowrap">${fmtDateShort(m.date)}</td>
      <td class="name">${esc(m.opponent)}</td>
      <td><span class="mc-badge ${rl}" style="width:22px;height:22px;font-size:12px;display:inline-flex">${r}</span> <span class="muted">${m.goalsFor}–${m.goalsAgainst}</span></td>
      <td>${papel}</td>
      <td class="cell-num ${g?"":"muted"}">${g||"–"}</td>
      <td class="cell-num ${a?"":"muted"}">${a||"–"}</td>
    </tr>`;
  }).filter(Boolean).join("");
  const nTit = countableMatches().filter(m=>(m.starters||[]).includes(pid)).length;
  const stat=(n,l,sub)=>`<div class="card"><div class="stat-num num">${n}</div><div class="stat-label">${l}</div>${sub?`<div class="stat-sub">${sub}</div>`:""}</div>`;
  return `<div class="section-title"><h2 style="display:flex;align-items:center;gap:12px"><button class="btn sm ghost" data-act="voltar">← Voltar</button> ${esc(p.name)}</h2></div>
    <div class="grid">
      ${stat(p.jogos,"Jogos", `${nTit} como titular`)}
      ${stat(p.gols,"Gols", p.jogos?`${dec(p.gpj,2)} por jogo`:"")}
      ${stat(p.assist,"Assistências","")}
      ${stat(p.part,"Participações", p.jogos?`${dec(p.ppj,2)} por jogo`:"")}
    </div>
    <div class="grid" style="margin-top:12px">
      <div class="card"><div class="stat-num num">${p.v}·${p.e}·${p.d}</div><div class="stat-label">V · E · D com ele em campo</div></div>
      <div class="card"><div class="stat-num num">${pct(p.aprov)}</div><div class="stat-label">Aproveitamento do time</div><div class="stat-sub">quando ele joga</div></div>
      <div class="card"><div class="stat-num num">${pct(p.share)}</div><div class="stat-label">Fatia dos gols do time</div></div>
    </div>
    <div class="panel" style="margin-top:16px">
      <div class="panel-head"><div><h3>Jogo a jogo</h3><div class="sub">só partidas que contam · mais recentes primeiro</div></div></div>
      ${log?`<div class="table-wrap"><table class="stats">
        <thead><tr><th>Data</th><th>Adversário</th><th>Placar</th><th>Papel</th><th>G</th><th>A</th></tr></thead>
        <tbody>${log}</tbody></table></div>`:`<div class="empty" style="padding:24px"><p>Sem jogos registrados para ${esc(p.name)}.</p></div>`}
    </div>`;
}

/* ---------- Adversários ---------- */
function viewAdversarios(s){
  if(s.opponents.length===0) return activeMatches().length
    ? `<div class="empty" style="padding:30px"><div class="big" style="font-size:42px">📅</div><h3>Nenhum jogo no período</h3><p>Ajuste o seletor de período acima.</p></div>`
    : emptyState("Sem adversários","Cadastre partidas para ver o retrospecto.","partidas");
  let list=[...s.opponents].sort((a,b)=> b.J-a.J || b.aprov-a.aprov || a.opponent.localeCompare(b.opponent,"pt"));
  const rows = list.map(o=>{
    const rl = o.aprov>=0.6?"v":o.aprov>=0.34?"e":"d";
    return `<tr>
      <td class="name">${esc(o.opponent)}</td>
      <td class="cell-num">${o.J}</td>
      <td class="cell-num">${o.V}</td><td class="cell-num">${o.E}</td><td class="cell-num">${o.D}</td>
      <td class="cell-num">${o.GP}</td><td class="cell-num">${o.GC}</td>
      <td class="cell-num ${o.SG>0?'':''}" style="color:${o.SG>0?'#137a3c':o.SG<0?'#a83f30':'inherit'}">${o.SG>0?"+":""}${o.SG}</td>
      <td><span class="pill ${rl}">${pct(o.aprov)}</span></td>
    </tr>`;
  }).join("");
  const repetidos = list.filter(o=>o.J>1).length;
  return `<div class="section-title"><h2>Retrospecto por adversário</h2><span class="hint">${list.length} adversários · ${repetidos} enfrentados mais de uma vez</span></div>
    <div class="panel"><div class="table-wrap"><table class="stats">
      <thead><tr><th>Adversário</th><th>J</th><th>V</th><th>E</th><th>D</th><th>GP</th><th>GC</th><th>SG</th><th>Aprov.</th></tr></thead>
      <tbody>${rows}</tbody>
    </table></div></div>`;
}
